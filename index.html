<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechControl Pro - Sistema de Inventario</title>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
:root {
    --bg-principal: #0f0f0f;
    --bg-tarjeta: #1a1a1a;
    --verde-tecnico: #2ecc71;
    --naranja-aviso: #e67e22;
    --rojo-error: #e74c3c;
    --texto-claro: #ececec;
    --texto-dim: #888888;
    --borde: #2d2d2d;
}

body { 
    background-color: var(--bg-principal); 
    color: var(--texto-claro); 
    font-family: 'Inter', sans-serif; 
    margin: 0; 
}

.hidden { display: none !important; }

/* Tablas y Edición */
.edit-cell { cursor: text; transition: background 0.2s; padding: 5px; }
.edit-cell:hover { background: #222; }
.edit-cell:focus { background: #333; outline: 1px solid var(--verde-tecnico); }

.select-status { 
    background: #000; color: #fff; border: 1px solid #444; 
    padding: 5px; border-radius: 4px; cursor: pointer; width: 100%; 
}

/* UI Móvil */
#action-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a1a1a; padding: 20px;
    border-top: 2px solid var(--verde-tecnico);
    z-index: 2000; border-radius: 20px 20px 0 0;
}

.input-field {
    width: 100%; padding: 12px; margin: 10px 0;
    background: #000; border: 1px solid #444;
    color: white; border-radius: 8px; box-sizing: border-box;
}

.btn-large { 
    width: 100%; padding: 15px; margin: 5px 0; 
    border-radius: 8px; font-weight: bold; border: none; cursor: pointer; 
}

.btn-general { background: #2ecc71 !important; color: #000 !important; }
.btn-cable { background: #e67e22 !important; color: #fff !important; }
.btn-status-ok { background: #2ecc71 !important; color: #000 !important; }
.btn-status-broken { background: #e74c3c !important; color: #fff !important; }
.btn-cancel { background: transparent; border: 1px solid #666; color: #ccc; margin-top: 10px; }

/* Barra de estado que te faltaba posicionar bien */
.status-bar { position: fixed; top: 0; width: 100%; background: #000; padding: 5px 20px; font-size: 12px; display: flex; align-items: center; z-index: 3000; border-bottom: 1px solid #222; }
.dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot-online { background-color: #2ecc71; }
.dot-offline { background-color: #e74c3c; }

/* PC Layout */
.main-header { padding: 20px; background: var(--bg-tarjeta); display: flex; justify-content: space-between; border-bottom: 1px solid var(--borde); }
.tables-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
@media (max-width: 900px) { .tables-container { grid-template-columns: 1fr; } }
.table-card { background: var(--bg-tarjeta); padding: 15px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--texto-dim); padding: 10px; border-bottom: 1px solid var(--borde); }
td { padding: 10px; border-bottom: 1px solid #222; }
code { background: #000; color: var(--verde-tecnico); padding: 2px 6px; border-radius: 4px; }
#reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid var(--verde-tecnico); border-radius: 12px; overflow: hidden; }

/* Añade esto al final de tu <style> */
#reader { 
    width: 100%; 
    max-width: 450px; 
    margin: 0 auto; 
}
    .btn-delete {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
}
.btn-delete:hover { background: #c0392b; }   
   </style>
</head>
<body>
    <div class="status-bar">
        <span id="connection-dot" class="dot dot-online"></span>
        <span id="connection-text" style="color: #00e676; font-weight: bold;">ONLINE</span>
        <span id="offline-toast" class="hidden" style="margin-left: auto; color: #ff9800; font-size: 0.8rem;"></span>
    </div>

    <div id="mobile-app" style="padding: 15px; margin-top: 45px; background: #111; border-bottom: 2px solid #333;">
        <div id="reader-container" style="max-width: 500px; margin: 0 auto;">
            <div id="reader"></div>
        </div>
        
        <div id="mobile-sync-controls" style="background: #222; padding: 15px; margin: 15px auto; border-radius: 10px; display: flex; gap: 10px; align-items: center; max-width: 500px;">
            <input type="text" id="input-host-id" placeholder="Código PC (ej: RD-A1B2)" 
                   style="flex-grow: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff;">

                <span id="items-left-count" style="font-size: 4rem; color: var(--verde-tecnico); font-weight: bold;">0</span>

    <div id="pc-dashboard">

        <section class="search-section" style="padding: 15px;">

        <div class="tables-container">

                <div style="overflow-x: auto;">
                    <table id="tableGeneral">
                        <thead><tr><th>ID_QR</th><th>N/S</th><th>Nombre</th><th>Estado</th><th>Acción</th></tr></thead>
                        <tbody id="bodyGeneral"></tbody>
                    </table>

                <h2>Inventario de Cables</h2>
                <div style="overflow-x: auto;">

                        <thead><tr><th>ID_QR</th><th>N/S</th><th>Longitud</th><th>Estado</th><th>Acción</th></tr></thead>
                        <tbody id="bodyCables"></tbody>

    <div id="confirm-module" class="modal-overlay hidden">
        <div id="channel-card" class="card-large">
            <div id="card-header"><span id="instrument-family">FAMILIA</span></div>
            <div id="channel-number">01</div>
            <div id="patch-info">
                <h2 id="patch-name">INSTRUMENTO</h2>
                <p id="mic-model" style="margin-top: 5px; font-weight: bold;">--</p>
            </div>
            <button class="btn-confirm-patch" onclick="PATCHER.confirm()">CONFIRMAR CONEXIÓN</button>
            <button class="btn-cancel" onclick="document.getElementById('confirm-module').classList.add('hidden')">CANCELAR</button>

<script>
    // Configuración de PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // --- Diccionarios y Configuración ---       pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
       // Diccionarios y Configuración
        const FOLDER_COLORS = { DRUMS: '#ff5252', BASS: '#7c4dff', GUITARS: '#ffab40', KEYS: '#448aff', VOCALS: '#eeff41', PERC: '#69f0ae' };

        // --- GESTOR DE BASE DE DATOS LOCAL ---
       const DB_MANAGER = {
    KEYS: { GENERAL: 'inventario_general', CABLES: 'inventario_cables' },
    save: function(key, data) {
        try { 
            localStorage.setItem(key, JSON.stringify(data));
            // Esta es la clave: si hay cambios, avisamos a todos los dispositivos
            if (SyncSystem) SyncSystem.broadcastUpdate();
        } catch (error) { console.error("Error localStorage:", error); }
    },
    load: function(key) { return JSON.parse(localStorage.getItem(key)) || []; },
    addGeneral: function(item) {
        let inventario = this.load(this.KEYS.GENERAL);
        const index = inventario.findIndex(i => i.id_qr === item.id_qr);
        if(index > -1) inventario[index] = item; else inventario.push(item);
        this.save(this.KEYS.GENERAL, inventario);
    },
    addCable: function(cable) {
        let inventario = this.load(this.KEYS.CABLES);
        const index = inventario.findIndex(i => i.id_qr === cable.id_qr);
        if(index > -1) inventario[index] = cable; else inventario.push(cable);
        this.save(this.KEYS.CABLES, inventario);
    }
};

        // --- SISTEMA DE SINCRONIZACIÓN (PEER.JS) ---
const SyncSystem = {
    peer: null,
    conn: null, 
    connections: [], 
    isPC: true,

    init: function() {
        const id = 'RD-' + Math.random().toString(36).substring(2, 6).toUpperCase();
        this.peer = new Peer(id);
        
        this.peer.on('open', (id) => {
            document.getElementById('display-session-id').innerText = id;
        });

        this.peer.on('connection', (c) => {
            this.connections.push(c);
            this.setupListeners(c);
            this.broadcastUpdate(); 
            UI.updateConnectionStatus(true);
        });
    },

    setupListeners: function(connection) {
        connection.on('data', (payload) => {
            // Caso A: El PC recibe un escaneo nuevo del móvil
            if(payload.type === 'NEW_ENTRY') {
                if(payload.category === 'GENERAL') DB_MANAGER.addGeneral(payload.data);
                else DB_MANAGER.addCable(payload.data);
                DASHBOARD.render();
                if(this.isPC) this.broadcastUpdate(); 
            }
            // Caso B: El móvil recibe la base de datos completa del PC
            if(payload.type === 'SYNC_ALL') {
                localStorage.setItem(DB_MANAGER.KEYS.GENERAL, JSON.stringify(payload.general));
                localStorage.setItem(DB_MANAGER.KEYS.CABLES, JSON.stringify(payload.cables));
                document.getElementById('display-session-id').innerText = payload.hostId + " (VINCULADO)";
                this.isPC = false;
                DASHBOARD.render();
            }
        });
    },

    // ESTA FUNCIÓN FALTABA Y ES POR LO QUE EL MÓVIL NO ENVIABA NADA
    sendScan: function(data) {
        if (this.isPC) return; // El PC no envía escaneos individuales
        if (this.conn && this.conn.open) {
            this.conn.send(data);
        } else {
            alert("No hay conexión con el PC");
        }
    },

    broadcastUpdate: function() {
        if(!this.isPC) return; 
        const data = {
            type: 'SYNC_ALL',
            hostId: this.peer.id,
            general: DB_MANAGER.load(DB_MANAGER.KEYS.GENERAL),
            cables: DB_MANAGER.load(DB_MANAGER.KEYS.CABLES)
        };
        this.connections.forEach(c => {
            if (c.open) c.send(data);
        });
    },

    connectToHost: function(hostId) {
        this.conn = this.peer.connect(hostId);
        this.isPC = false;
        this.setupListeners(this.conn);
        this.conn.on('open', () => UI.updateConnectionStatus(true));
    }
};
const DASHBOARD = {
    render: function() {
        this.renderTableGeneral(DB_MANAGER.load(DB_MANAGER.KEYS.GENERAL));
        this.renderTableCables(DB_MANAGER.load(DB_MANAGER.KEYS.CABLES));
    },

    renderTableGeneral: function(data) {
        document.getElementById('bodyGeneral').innerHTML = data.map(item => `
            <tr>
                <td><code>${item.id_qr}</code></td>
                <td contenteditable="true" class="edit-cell" onblur="DASHBOARD.updateField('GENERAL', '${item.id_qr}', 'ns', this.innerText)">${item.ns || ''}</td>
                <td contenteditable="true" class="edit-cell" onblur="DASHBOARD.updateField('GENERAL', '${item.id_qr}', 'nombre_asig', this.innerText)">${item.nombre_asig || ''}</td>
                <td>
                    <select onchange="DASHBOARD.updateField('GENERAL', '${item.id_qr}', 'estado', this.value)" class="select-status">
                        <option value="OK" ${item.estado === 'OK' ? 'selected' : ''}>OK</option>
                        <option value="ESTROPEADO" ${item.estado === 'ESTROPEADO' ? 'selected' : ''}>ESTROPEADO</option>
                    </select>
                </td>
                <td><button class="btn-delete" onclick="DASHBOARD.deleteItem('GENERAL', '${item.id_qr}')">🗑️</button></td>
            </tr>
        `).join('');
    },

    renderTableCables: function(data) {
        document.getElementById('bodyCables').innerHTML = data.map(item => `
            <tr>
                <td><code>${item.id_qr}</code></td>
                <td contenteditable="true" class="edit-cell" onblur="DASHBOARD.updateField('CABLES', '${item.id_qr}', 'ns', this.innerText)">${item.ns || ''}</td>
                <td contenteditable="true" class="edit-cell" onblur="DASHBOARD.updateField('CABLES', '${item.id_qr}', 'longitud', this.innerText)">${item.longitud || ''}</td>
                <td>
                    <select onchange="DASHBOARD.updateField('CABLES', '${item.id_qr}', 'estado', this.value)" class="select-status">
                        <option value="OK" ${item.estado === 'OK' ? 'selected' : ''}>OK</option>
                        <option value="ESTROPEADO" ${item.estado === 'ESTROPEADO' ? 'selected' : ''}>ESTROPEADO</option>
                    </select>
                </td>
                <td><button class="btn-delete" onclick="DASHBOARD.deleteItem('CABLES', '${item.id_qr}')">🗑️</button></td>
            </tr>
        `).join('');
    },

   updateField: function(type, qrId, field, value) {
        const key = type === 'GENERAL' ? DB_MANAGER.KEYS.GENERAL : DB_MANAGER.KEYS.CABLES;
        let inventario = DB_MANAGER.load(key);
        const index = inventario.findIndex(i => i.id_qr === qrId);
        if (index > -1) {
            inventario[index][field] = value.trim();
            // Esto guarda y avisa a los demás dispositivos
            DB_MANAGER.save(key, inventario);
        }
    },
   deleteItem: function(type, qrId) {
        if (confirm(`¿Estás seguro de eliminar el artículo con QR: ${qrId}?`)) {
            const key = type === 'GENERAL' ? DB_MANAGER.KEYS.GENERAL : DB_MANAGER.KEYS.CABLES;
            let inventario = DB_MANAGER.load(key);
            
            // Filtramos para borrar
            inventario = inventario.filter(i => i.id_qr !== qrId);
            
            // Guardamos localmente y disparamos la sincronización global
            DB_MANAGER.save(key, inventario);
            
            this.render();
        }
    },

    filterTables: function() {
        const query = document.getElementById('globalSearch').value.toLowerCase();
        document.querySelectorAll('tbody tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none';
        });
    }
};

        // --- LÓGICA DE PDF Y MAPEO ---
        const PDF_PROCESSOR = {
            listaCanales: [],
            async extraerRider(file) {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(item => item.str).join(" ");
                    }
                    PDF_PROCESSOR.parsearCanales(fullText);
                };
                reader.readAsArrayBuffer(file);
            },
            parsearCanales: function(texto) {
                const regexCanal = /(\d+)\s+([a-zA-Z\s]{3,20})/g;
                let match;
                this.listaCanales = [];
                while ((match = regexCanal.exec(texto)) !== null) {
                    this.listaCanales.push({ canal: match[1], instrumento: match[2].trim().toUpperCase() });
                }
                alert(`✅ Rider Procesado: Se detectaron ${this.listaCanales.length} canales.`);
            }
        };

        const MAPPER_LOGIC = {
            verificarVinculacion: function(itemEscaneado) {
                if (!itemEscaneado.nombre_asig || itemEscaneado.tipo === 'CABLE') return;
                const nombreBusqueda = itemEscaneado.nombre_asig.trim().toUpperCase();
                const canalEncontrado = PDF_PROCESSOR.listaCanales.find(c => {
                    const inst = c.instrumento.trim().toUpperCase();
                    return nombreBusqueda.includes(inst) || inst.includes(nombreBusqueda);
                });
                if (canalEncontrado) {
                    SyncSystem.sendScan({
                        accion: 'ALERTA_VINCULACION',
                        mensaje: `VINCULADO: ${itemEscaneado.nombre_asig} -> CANAL ${canalEncontrado.canal}`,
                        canal: canalEncontrado.canal,
                        instrumento: canalEncontrado.instrumento,
                        familia: "DRUMS", // Predeterminado para prueba
                        id_qr: itemEscaneado.id_qr
                    });
                }
            }
        };

        // --- UI MÓVIL Y ACCIONES ---
        const UI = {
            // ESTO ES LO QUE TIENES QUE AÑADIR:
            toggleSyncModal: () => {
                const modal = document.getElementById('modal-sync');
                modal.classList.toggle('hidden');
            },
            
            panel: document.getElementById('action-panel'),
            showNewItemForm: function(qrId) {
                this.panel.innerHTML = `
                    <h2>¡Nuevo QR Detectado!</h2>
                    <p style="color:#aaa">ID: ${qrId}</p>
                    <button class="btn-large btn-general" onclick="UI.renderForm('GENERAL', '${qrId}')">General (Micro/DI)</button>
                    <button class="btn-large btn-cable" onclick="UI.renderForm('CABLE', '${qrId}')">Cable</button>
                `;
                this.panel.classList.remove('hidden');
            },
            renderForm: function(type, qrId) {
                let fields = type === 'GENERAL' ? `<input type="text" id="n_asig" class="input-field" placeholder="Nombre Asignado (ej. Kick Out)">` : `<input type="text" id="longitud" class="input-field" placeholder="Longitud (ej. 10m)">`;
                this.panel.innerHTML = `
                    <h3>Registrar ${type}</h3>
                    <input type="text" id="n_ser" class="input-field" placeholder="N/S (Opcional)">
                    ${fields}
                    <button class="btn-large btn-status-ok" onclick="UI.saveNew('${type}', '${qrId}')">Guardar y Sincronizar</button>
                    <button class="btn-cancel" style="width:100%; border-color:#fff; color:#fff" onclick="UI.panel.classList.add('hidden')">Cancelar</button>
                `;
            },
            showExistingItem: function(item) {
                this.panel.innerHTML = `
                    <div style="background:var(--card-bg); padding:20px; border-radius:12px; text-align:center;">
                        <h2>${item.nombre_asig || item.tipologia}</h2>
                        <p>N/S: ${item.ns} | ID: ${item.id_qr}</p>
                        <button class="btn-large ${item.estado === 'OK' ? 'btn-status-ok' : 'btn-status-broken'}">ESTADO: ${item.estado}</button>
                        <button class="btn-cancel" style="width:100%; border-color:#fff; color:#fff; margin-top:10px" onclick="UI.panel.classList.add('hidden')">Cerrar</button>
                    </div>
                `;
                this.panel.classList.remove('hidden');
            },
saveNew: function(type, qrId) {
    const data = { 
        id_qr: qrId, 
        ns: document.getElementById('n_ser').value, 
        estado: 'OK', 
        timestamp: new Date().getTime(), 
        tipo: type,
        nombre_asig: type === 'GENERAL' ? document.getElementById('n_asig').value : '',
        longitud: type === 'CABLE' ? document.getElementById('longitud').value : '',
        tipologia: type === 'CABLE' ? 'Cable/Adaptador' : 'Micro/DI'
    };

    // 1. Guardar localmente
    if(type === 'GENERAL') DB_MANAGER.addGeneral(data); 
    else DB_MANAGER.addCable(data);
    
    // 2. Enviar al PC
    SyncSystem.sendScan({ 
        type: 'NEW_ENTRY', 
        category: type === 'GENERAL' ? 'GENERAL' : 'CABLES', 
        data: data 
    });

    this.panel.innerHTML = "<h3 style='color:#2ecc71; text-align:center'>✅ Sincronizado</h3>";
    setTimeout(() => {
        this.panel.classList.add('hidden');
        DASHBOARD.render(); 
    }, 1000);
},
            updateConnectionStatus: function(isOnline = true) {
        const dot = document.getElementById('connection-dot');
        const text = document.getElementById('connection-text');
        
        if (isOnline) {
            // Si hay móviles vinculados al PC, mostramos cuántos
            const activos = SyncSystem.connections ? SyncSystem.connections.filter(c => c.open).length : 0;
            
            dot.className = "dot dot-online";
            text.style.color = "#00e676";
            
            if (activos > 0) {
                text.innerText = `ONLINE (${activos} dispositivos)`;
            } else {
                text.innerText = "ONLINE (Esperando vinculación...)";
            }
        } else {
            // Este es el ELSE que preguntabas: se activa si falla el internet o PeerJS
            dot.className = "dot dot-offline";
            text.innerText = "OFFLINE - Error de Red";
            text.style.color = "#ff5252";
        }
    },
            notifyOffline: function() {
                const toast = document.getElementById('offline-toast');
                toast.innerText = `⚠️ ${SyncSystem.offlineQueue.length} pendientes`;
                toast.classList.remove('hidden');
            },
            notifySyncSuccess: function() {
                const toast = document.getElementById('offline-toast');
                toast.innerText = `✅ Sincronizado`;
                setTimeout(() => toast.classList.add('hidden'), 3000);
            }
        };

        const PATCHER = {
            currentMatch: null,
            confirm: function() {
                SyncSystem.sendScan({ accion: 'CONFIRMAR_PATCH', canal: this.currentMatch.canal, id_qr: this.currentMatch.id_qr });
                document.getElementById('confirm-module').classList.add('hidden');
            }
        };

        const LOAD_OUT = {
            itemsEnUso: [],
            activar: function() {
                const general = DB_MANAGER.load(DB_MANAGER.KEYS.GENERAL);
                const cables = DB_MANAGER.load(DB_MANAGER.KEYS.CABLES);
                this.itemsEnUso = [...general, ...cables].filter(item => item.estado !== 'ESTROPEADO');
                document.getElementById('items-left-count').innerText = this.itemsEnUso.length;
                
                // Mostrar alerta en PC, pero activar UI en móvil (requiere que el móvil sepa que está en loadout)
                // Para propósitos de este código unificado, abrimos el panel localmente.
                document.getElementById('loadout-screen').classList.remove('hidden');
            },
            procesarEscaneo: function(qrId) {
                const index = this.itemsEnUso.findIndex(item => item.id_qr === qrId);
                if (index !== -1) {
                    this.itemsEnUso.splice(index, 1);
                    document.getElementById('items-left-count').innerText = this.itemsEnUso.length;
                    UI.panel.innerHTML = `<h3 style="color:var(--accent)">✅ Recogido</h3>`;
                    UI.panel.classList.remove('hidden');
                    setTimeout(() => UI.panel.classList.add('hidden'), 1000);
                    if (this.itemsEnUso.length === 0) alert("🎉 Todo el equipo está recogido. Puedes cerrar sesión.");
                } else {
                    alert("⚠️ Este objeto no estaba en uso o ya fue recogido.");
                }
            }
        };

        const MAINTENANCE = {
            generateReport: function() {
                const general = DB_MANAGER.load(DB_MANAGER.KEYS.GENERAL);
                const cables = DB_MANAGER.load(DB_MANAGER.KEYS.CABLES);
                const averiados = [...general, ...cables].filter(item => item.estado === 'ESTROPEADO');
                if (averiados.length === 0) return alert("✅ ¡Todo el equipo está en perfecto estado!");
                let reportText = "📋 REPORTE DE MANTENIMIENTO\n===========================\n\n";
                averiados.forEach((item, i) => reportText += `${i+1}. [${item.id_qr}] ${item.nombre_asig || item.tipologia} (N/S: ${item.ns})\n`);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([reportText], { type: 'text/plain' }));
                a.download = `mantenimiento.txt`;
                a.click();
            }
        };

     // --- INICIALIZACIÓN GLOBAL ---
window.onload = () => {
    // 1. Forzar el renderizado inicial de lo que haya en LocalStorage
    DASHBOARD.render(); 
    
    // 2. Arrancar PeerJS
    SyncSystem.init();

    // 3. Configurar el Escáner
    const scanner = new Html5Qrcode("reader");
    const config = { 
        fps: 20, 
        qrbox: { width: 250, height: 250 }, 
        aspectRatio: 1.0 
    };

    scanner.start({ facingMode: "environment" }, config, (msg) => {
        if (navigator.vibrate) navigator.vibrate(100);
        
        const modoRecogida = !document.getElementById('loadout-screen').classList.contains('hidden');
        
        if (modoRecogida) {
            LOAD_OUT.procesarEscaneo(msg);
        } else {
            // Buscamos si el QR ya existe en alguna de las dos tablas
            const todos = [...DB_MANAGER.load(DB_MANAGER.KEYS.GENERAL), ...DB_MANAGER.load(DB_MANAGER.KEYS.CABLES)];
            const item = todos.find(x => x.id_qr === msg);
            
            if (item) {
                UI.showExistingItem(item);
            } else {
                UI.showNewItemForm(msg);
            }
        }
    }).catch(e => console.warn("Esperando permisos de cámara...", e));
};
window.addEventListener('online', () => UI.updateConnectionStatus(true));
window.addEventListener('offline', () => UI.updateConnectionStatus(false));
</script>
