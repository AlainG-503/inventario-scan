<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechControl Pro - Sistema de Inventario</title>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
:root {
    --bg-principal: #0f0f0f;
    --bg-tarjeta: #1a1a1a;
    --verde-tecnico: #2ecc71;
    --naranja-aviso: #e67e22;
    --rojo-error: #e74c3c;
    --texto-claro: #ececec;
    --texto-dim: #888888;
    --borde: #2d2d2d;
}

body { 
    background-color: var(--bg-principal); 
    color: var(--texto-claro); 
    font-family: 'Inter', sans-serif; 
    margin: 0; 
}

.hidden { display: none !important; }

/* Tablas y Edición */
.edit-cell { cursor: text; transition: background 0.2s; padding: 5px; }
.edit-cell:hover { background: #222; }
.edit-cell:focus { background: #333; outline: 1px solid var(--verde-tecnico); }

.select-status { 
    background: #000; color: #fff; border: 1px solid #444; 
    padding: 5px; border-radius: 4px; cursor: pointer; width: 100%; 
}

/* UI Móvil */
#action-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a1a1a; padding: 20px;
    border-top: 2px solid var(--verde-tecnico);
    z-index: 2000; border-radius: 20px 20px 0 0;
}

.input-field {
    width: 100%; padding: 12px; margin: 10px 0;
    background: #000; border: 1px solid #444;
    color: white; border-radius: 8px; box-sizing: border-box;
}

.btn-large { 
    width: 100%; padding: 15px; margin: 5px 0; 
    border-radius: 8px; font-weight: bold; border: none; cursor: pointer; 
}

.btn-general { background: #2ecc71 !important; color: #000 !important; }
.btn-cable { background: #e67e22 !important; color: #fff !important; }
.btn-status-ok { background: #2ecc71 !important; color: #000 !important; }
.btn-status-broken { background: #e74c3c !important; color: #fff !important; }
.btn-cancel { background: transparent; border: 1px solid #666; color: #ccc; margin-top: 10px; }

/* Barra de estado que te faltaba posicionar bien */
.status-bar { position: fixed; top: 0; width: 100%; background: #000; padding: 5px 20px; font-size: 12px; display: flex; align-items: center; z-index: 3000; border-bottom: 1px solid #222; }
.dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot-online { background-color: #2ecc71; }
.dot-offline { background-color: #e74c3c; }

/* PC Layout */
.main-header { padding: 20px; background: var(--bg-tarjeta); display: flex; justify-content: space-between; border-bottom: 1px solid var(--borde); }
.tables-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
@media (max-width: 900px) { .tables-container { grid-template-columns: 1fr; } }
.table-card { background: var(--bg-tarjeta); padding: 15px; border-radius: 8px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--texto-dim); padding: 10px; border-bottom: 1px solid var(--borde); }
td { padding: 10px; border-bottom: 1px solid #222; }
code { background: #000; color: var(--verde-tecnico); padding: 2px 6px; border-radius: 4px; }
#reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid var(--verde-tecnico); border-radius: 12px; overflow: hidden; }

/* Añade esto al final de tu <style> */
#reader { 
    width: 100%; 
    max-width: 450px; 
    margin: 0 auto; 
}
    .btn-delete {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
}
.btn-delete:hover { background: #c0392b; }   
.loadout-active {
    border: 3px solid #2ecc71;
    box-shadow: 0 0 15px #2ecc71;
}

.loadout-active .status-bar {
    background: #002b1a;
}

.loadout-active #items-left-count {
    color: #00ff9c !important;
}
   </style>
</head>
<body>
    <div class="status-bar">
        <span id="connection-dot" class="dot dot-online"></span>
        <span id="connection-text" style="color: #00e676; font-weight: bold;">ONLINE</span>
        <span id="offline-toast" class="hidden" style="margin-left: auto; color: #ff9800; font-size: 0.8rem;"></span>
    </div>

    <div id="mobile-app" style="padding: 15px; margin-top: 45px; background: #111; border-bottom: 2px solid #333;">
        <div id="reader-container" style="max-width: 500px; margin: 0 auto;">
            <div id="reader"></div>
        </div>
        
        <div id="mobile-sync-controls" style="background: #222; padding: 15px; margin: 15px auto; border-radius: 10px; display: flex; gap: 10px; align-items: center; max-width: 500px;">
            <input type="text" id="input-host-id" placeholder="Código PC (ej: RD-A1B2)" 
                   style="flex-grow: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff;">
            <button onclick="SyncSystem.connectToHost(document.getElementById('input-host-id').value)" 
                    style="background: var(--verde-tecnico); border: none; padding: 12px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000;">
                Vincular
            </button>
        </div>

        <div id="action-panel" class="hidden" style="margin: 15px auto; max-width: 500px;"></div>

        <div id="loadout-screen" class="hidden">
            <div class="counter-header" style="text-align: center; padding: 20px; background: #000; border: 1px solid var(--verde-tecnico); border-radius: 10px; margin-bottom: 10px;">
                <span id="items-left-count" style="font-size: 4rem; color: var(--verde-tecnico); font-weight: bold;">0</span>
                <p style="margin: 0; color: #888;">EQUIPOS PENDIENTES</p>
            </div>
        </div>
    </div>

    <div id="pc-dashboard">
        <header class="main-header">
            <div>
                <h1 style="margin:0; font-size: 1.5rem;">Gestor de Inventario Raider</h1>
                <div id="sync-code">SESIÓN: <span id="display-session-id" style="color: var(--verde-tecnico); font-weight: bold;">---</span></div>
            </div>
            <div class="header-actions" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="file" id="pdf-upload" style="display: none;" onchange="PDF_PROCESSOR.extraerRider(this.files[0])">
                <button class="btn-large" style="background: #2196f3; color: white; width: auto; padding: 10px 15px;" onclick="document.getElementById('pdf-upload').click()">📂 Cargar Rider</button>
                <button class="btn-large" style="width: auto; padding: 10px 15px;" onclick="MAINTENANCE.generateReport()">📋 Reporte</button>
<button class="btn-large" style="background: #e91e63; color: white; width: auto; padding: 10px 15px;" onclick="LOAD_OUT.activar()">📦 Recogida</button>    
            </div>
        </header>

        <section class="search-section" style="padding: 15px;">
            <input type="text" id="globalSearch" class="input-field" placeholder="🔍 Buscar por ID_QR, Nombre o N/S..." onkeyup="DASHBOARD.filterTables()">
        </section>

        <div class="tables-container">
            <div class="table-card">
                <h2>Inventario General</h2>
                <div style="overflow-x: auto;">
                    <table id="tableGeneral">
                        <thead><tr><th>ID_QR</th><th>N/S</th><th>Nombre</th><th>Estado</th><th>Acción</th></tr></thead>
                        <tbody id="bodyGeneral"></tbody>
                    </table>
                </div>
            </div>

            <div class="table-card">
                <h2>Inventario de Cables</h2>
                <div style="overflow-x: auto;">
                    <table id="tableCables">
                        <thead><tr><th>ID_QR</th><th>N/S</th><th>Longitud</th><th>Estado</th><th>Acción</th></tr></thead>
                        <tbody id="bodyCables"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="confirm-module" class="modal-overlay hidden">
        <div id="channel-card" class="card-large">
            <div id="card-header"><span id="instrument-family">FAMILIA</span></div>
            <div id="channel-number">01</div>
            <div id="patch-info">
                <h2 id="patch-name">INSTRUMENTO</h2>
                <p id="mic-model" style="margin-top: 5px; font-weight: bold;">--</p>
            </div>
            <button class="btn-confirm-patch" onclick="PATCHER.confirm()">CONFIRMAR CONEXIÓN</button>
            <button class="btn-cancel" onclick="document.getElementById('confirm-module').classList.add('hidden')">CANCELAR</button>
        </div>
    </div>

<script>
// =====================================================
// PDF.JS CONFIG
// =====================================================
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

// =====================================================
// UI SAFE (EVITA CRASHES)
// =====================================================
const UI = {
  updateConnectionStatus(ok) {
    const el = document.getElementById("connection-text");
    const dot = document.getElementById("connection-dot");

    if (!el || !dot) return;

    el.innerText = ok ? "ONLINE" : "OFFLINE";
    dot.className = ok ? "dot dot-online" : "dot dot-offline";
  },

  showExistingItem(item, canal = null) {
    if (canal) {
      alert(
        `🎯 ${item.nombre_asig || "ITEM"}\n` +
        `➡️ CANAL ${canal.canal}\n` +
        `🎚️ ${canal.instrumento}`
      );
    } else {
      alert(`⚠️ ${item.nombre_asig || "ITEM"}\n(No está en el Rider)`);
    }
  },

  showNewItemForm(id) {
    alert("❌ ITEM NO REGISTRADO: " + id);
  }
};

// =====================================================
// RIDER PDF PROCESSOR
// =====================================================
const PDF_PROCESSOR = {
  listaCanales: [],

  async extraerRider(file) {
    if (!file) return;

    const reader = new FileReader();

    reader.onload = async () => {
      try {
        const pdf = await pdfjsLib.getDocument(
          new Uint8Array(reader.result)
        ).promise;

        let text = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(x => x.str).join(" ") + "\n";
        }

        this.parsearCanales(text);

      } catch (e) {
        console.error("Error PDF:", e);
      }
    };

    reader.readAsArrayBuffer(file);
  },

  parsearCanales(texto) {
    this.listaCanales = [];

    const lineas = texto.split(/\n/);

    for (const linea of lineas) {
      const match = linea.match(/^(\d{1,3})\s+(.+)/);

      if (match) {
        this.listaCanales.push({
          canal: match[1],
          instrumento: match[2].trim().toUpperCase()
        });
      }
    }

    console.log("🎚 RIDER CARGADO:", this.listaCanales);
  },

  buscarCanalPorInstrumento(nombre) {
    if (!nombre) return null;

    const limpio = nombre.trim().toUpperCase();

    return this.listaCanales.find(c => {
      const inst = c.instrumento.toUpperCase();
      return limpio.includes(inst) || inst.includes(limpio);
    });
  }
};

// =====================================================
// DATABASE (LOCAL)
// =====================================================
const DB = {
  KEYS: {
    GENERAL: "inventario_general",
    CABLES: "inventario_cables"
  },

  load(key) {
    return JSON.parse(localStorage.getItem(key)) || [];
  },

  save(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
    Sync.broadcast();
  }
};

// =====================================================
// SYNC SYSTEM (PEERJS)
// =====================================================
const Sync = {
  peer: null,
  conn: null,
  peers: [],
  isHost: true,

  init() {
    const id = "RD-" + Math.random().toString(36).substring(2, 6).toUpperCase();

    this.peer = new Peer(id);

    this.peer.on("open", () => {
      document.getElementById("display-session-id").innerText = id;
    });

    this.peer.on("connection", (c) => {
      this.peers.push(c);
      this.setup(c);
      this.broadcast();
    });
  },

  setup(conn) {
    conn.on("data", (data) => {

      if (data.type === "SYNC") {
        localStorage.setItem(DB.KEYS.GENERAL, JSON.stringify(data.general));
        localStorage.setItem(DB.KEYS.CABLES, JSON.stringify(data.cables));

        this.isHost = false;
        DASHBOARD.render();
      }
    });
  },

  connect(hostId) {
    this.conn = this.peer.connect(hostId);
    this.isHost = false;

    this.conn.on("open", () => {
      UI.updateConnectionStatus(true);
    });

    this.setup(this.conn);
  },

  broadcast() {
    if (!this.isHost) return;

    const data = {
      type: "SYNC",
      general: DB.load(DB.KEYS.GENERAL),
      cables: DB.load(DB.KEYS.CABLES)
    };

    this.peers.forEach(p => p.send(data));
  }
};

// =====================================================
// DASHBOARD (MINIMAL FUNCIONAL)
// =====================================================
const DASHBOARD = {
  render() {
    console.log("Dashboard OK");
  }
};

// =====================================================
// LOADOUT
// =====================================================
const LOADOUT = {
  items: []
};

// =====================================================
// INIT APP
// =====================================================
window.onload = () => {

  DASHBOARD.render();
  Sync.init();

  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },

    (qr) => {

      const items = [
        ...DB.load(DB.KEYS.GENERAL),
        ...DB.load(DB.KEYS.CABLES)
      ];

      const item = items.find(x => x.id_qr === qr);

      if (!item) {
        UI.showNewItemForm(qr);
        return;
      }

      const canal = PDF_PROCESSOR.buscarCanalPorInstrumento(
        item.nombre_asig
      );

      UI.showExistingItem(item, canal);
    }
  );
};
</script>
</body>
</html>
